  <style>
    /* ── Custom Properties ─────────────────────────────────────── */
    :root {
      --navy-darkest:  #0c0a09;
      --navy-dark:     #1c1917;
      --navy-mid:      #292524;
      --navy-light:    #3d3530;
      --amber:         #b45309;
      --amber-light:   #fbbf24;
      --amber-dark:    #92400e;
      --white:         #ffffff;
      --slate-100:     #f1f5f9;
      --slate-200:     #e2e8f0;
      --slate-300:     #cbd5e1;
      --slate-400:     #94a3b8;
      --slate-600:     #475569;
      --slate-800:     #1e293b;
      --text-dark:     #0f172a;
      --radius-sm:     6px;
      --radius-md:     12px;
      --radius-lg:     20px;
      --radius-full:   9999px;
      --shadow-md:     0 4px 24px rgba(0,0,0,0.12);
      --shadow-lg:     0 12px 48px rgba(0,0,0,0.18);
      --shadow-amber:  0 8px 32px rgba(180,83,9,0.35);
      --transition:    all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 16px;
      color: var(--text-dark);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; line-height: 1.15; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    ul { list-style: none; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ── Fade-up animation (CSS only, scroll-driven) ─────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .service-card { animation: fadeUp 0.5s ease forwards; }
    .service-card:nth-child(2) { animation-delay: 0.1s; }
    .service-card:nth-child(3) { animation-delay: 0.2s; }
    .service-card:nth-child(4) { animation-delay: 0.3s; }
    .service-card:nth-child(5) { animation-delay: 0.4s; }
    .service-card:nth-child(6) { animation-delay: 0.5s; }

    /* ── Layout helpers ────────────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .section { padding: 96px 0; }
    .section-label {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 16px;
    }
    .section-heading {
      font-size: 40px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 16px;
    }
    .section-sub {
      font-size: 17px;
      color: var(--slate-600);
      max-width: 560px;
      margin-bottom: 56px;
    }

    /* ── Navigation ────────────────────────────────────────────── */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 0;
      transition: var(--transition);
    }
    #nav.scrolled {
      background: var(--navy-darkest);
      padding: 14px 0;
      box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }
    #nav:not(.scrolled) {
      background: linear-gradient(to bottom, rgba(28,25,23,0.8), transparent);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--amber-light); }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--slate-300);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .nav-phone {
      font-size: 14px;
      font-weight: 600;
      color: var(--slate-300);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: var(--transition);
      border: none;
      white-space: nowrap;
    }
    .btn-amber {
      background: var(--amber);
      color: var(--white);
      padding: 14px 28px;
      font-size: 15px;
      box-shadow: var(--shadow-amber);
    }
    .btn-amber:hover {
      background: var(--amber-dark);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(180,83,9,0.45);
    }
    .btn-outline-white {
      background: transparent;
      color: var(--white);
      padding: 14px 28px;
      font-size: 15px;
      border: 2px solid rgba(255,255,255,0.4);
    }
    .btn-outline-white:hover {
      border-color: var(--white);
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }
    .btn-amber-lg {
      background: var(--amber);
      color: var(--white);
      padding: 18px 40px;
      font-size: 17px;
      box-shadow: var(--shadow-amber);
    }
    .btn-amber-lg:hover {
      background: var(--amber-dark);
      transform: translateY(-3px);
      box-shadow: 0 16px 48px rgba(180,83,9,0.5);
    }
    .btn-outline-lg {
      background: transparent;
      color: var(--white);
      padding: 16px 38px;
      font-size: 17px;
      border: 2px solid rgba(255,255,255,0.5);
    }
    .btn-outline-lg:hover {
      border-color: var(--white);
      background: rgba(255,255,255,0.1);
      transform: translateY(-3px);
    }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: var(--transition);
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    #mobile-menu {
      display: none;
      flex-direction: column;
      gap: 0;
      background: var(--navy-darkest);
      padding: 8px 0 24px;
    }
    #mobile-menu.open { display: flex; }
    #mobile-menu a {
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 500;
      color: var(--slate-300);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    #mobile-menu a:hover { color: var(--white); background: rgba(255,255,255,0.04); }
    #mobile-menu .btn-amber {
      margin: 16px 24px 0;
      text-align: center;
    }

    /* ── Hero ──────────────────────────────────────────────────── */
    #hero {
      position: relative;
      min-height: 100vh;
      background-color: var(--navy-dark);
      background: radial-gradient(circle at 80% 20%, rgba(180,83,9,0.2) 0%, transparent 50%),
                  linear-gradient(135deg, #1c1917 0%, #0c0a09 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }
    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
    }
    #hero::after {
      content: '';
      position: absolute;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(180,83,9,0.14) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      padding: 160px 0 80px;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(180,83,9,0.15);
      border: 1px solid rgba(180,83,9,0.35);
      border-radius: var(--radius-full);
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--amber-light);
      letter-spacing: 0.05em;
      margin-bottom: 28px;
    }
    .hero-eyebrow svg { width: 14px; height: 14px; }
    h1 {
      font-size: 72px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.05;
      letter-spacing: -0.03em;
      max-width: 820px;
      margin-bottom: 24px;
    }
    h1 .highlight { color: var(--amber-light); }
    .hero-sub {
      font-size: 20px;
      color: var(--slate-300);
      max-width: 600px;
      line-height: 1.65;
      margin-bottom: 40px;
    }
    .hero-ctas {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .hero-badges {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .badge-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-full);
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--slate-300);
    }
    .badge-pill svg { width: 14px; height: 14px; color: var(--amber-light); flex-shrink: 0; }

    /* ── Stats bar ─────────────────────────────────────────────── */
    #stats {
      background: rgba(12,10,9,0.97);
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 32px 0;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }
    .stat-item {
      text-align: center;
      padding: 8px 24px;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .stat-item:last-child { border-right: none; }
    .stat-number {
      font-family: 'Poppins', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: var(--amber-light);
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--slate-400);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Services ──────────────────────────────────────────────── */
    #services { background: var(--slate-100); }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .service-card {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 32px 28px;
      border: 1px solid var(--slate-200);
      border-left: 3px solid transparent;
      box-shadow: var(--shadow-md);
      transition: var(--transition);
      cursor: default;
    }
    .service-card:hover {
      border-left-color: var(--amber);
      transform: translateX(5px);
      box-shadow: var(--shadow-lg);
    }
    .service-icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .service-icon-wrap svg { width: 28px; height: 28px; color: var(--white); }
    .icon-amber  { background: linear-gradient(135deg, #92400e, #b45309); }
    .icon-yellow { background: linear-gradient(135deg, #b45309, #d97706); }
    .icon-blue   { background: linear-gradient(135deg, #1e40af, #3b82f6); }
    .icon-teal   { background: linear-gradient(135deg, #0d7490, #06b6d4); }
    .icon-violet { background: linear-gradient(135deg, #6d28d9, #8b5cf6); }
    .icon-rose   { background: linear-gradient(135deg, #be123c, #f43f5e); }
    .service-title {
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    .service-desc {
      font-size: 14px;
      color: var(--slate-600);
      line-height: 1.65;
    }

    /* ── About ─────────────────────────────────────────────────── */
    #about { background: var(--white); overflow: hidden; }
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 80px;
      align-items: center;
    }
    .about-left { position: relative; }
    .about-accent-line {
      width: 4px;
      height: 56px;
      background: var(--amber);
      border-radius: 4px;
      margin-bottom: 28px;
    }
    .pull-quote {
      font-family: 'Poppins', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      letter-spacing: -0.02em;
      position: relative;
    }
    .pull-quote::before {
      content: '\201C';
      position: absolute;
      top: -28px;
      left: -12px;
      font-size: 96px;
      color: var(--amber);
      opacity: 0.15;
      font-family: Georgia, serif;
      line-height: 1;
    }
    .about-visual {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .about-visual-text {
      font-family: 'Poppins', sans-serif;
      font-size: 80px;
      font-weight: 900;
      color: rgba(255,255,255,0.06);
      letter-spacing: -0.04em;
      text-align: center;
      line-height: 1;
      user-select: none;
    }
    .about-badge-wrap {
      position: absolute;
      bottom: 28px;
      left: 28px;
      right: 28px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .about-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(180,83,9,0.9);
      color: var(--white);
      border-radius: var(--radius-full);
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
    }
    .about-right p {
      font-size: 16px;
      color: var(--slate-600);
      line-height: 1.8;
      margin-bottom: 20px;
    }
    .about-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 36px;
    }
    .about-stat {
      background: var(--slate-100);
      border-radius: var(--radius-md);
      padding: 20px;
      border-left: 3px solid var(--amber);
    }
    .about-stat-num {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--text-dark);
    }
    .about-stat-lbl {
      font-size: 13px;
      color: var(--slate-600);
      margin-top: 2px;
    }

    /* ── Reviews ───────────────────────────────────────────────── */
    #reviews {
      background: var(--navy-dark);
      position: relative;
      overflow: hidden;
    }
    #reviews::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
    }
    #reviews .section-heading { color: var(--white); }
    #reviews .section-sub { color: var(--slate-400); }
    .reviews-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 56px;
      flex-wrap: wrap;
      gap: 24px;
    }
    .reviews-rating-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(180,83,9,0.12);
      border: 1px solid rgba(180,83,9,0.25);
      border-radius: var(--radius-md);
      padding: 16px 24px;
    }
    .reviews-big-num {
      font-family: 'Poppins', sans-serif;
      font-size: 40px;
      font-weight: 800;
      color: var(--amber-light);
      line-height: 1;
    }
    .reviews-stars { font-size: 20px; color: var(--amber-light); letter-spacing: 2px; }
    .reviews-count { font-size: 13px; color: var(--slate-400); margin-top: 2px; }
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .review-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-md);
      padding: 32px;
      position: relative;
      transition: var(--transition);
    }
    .review-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(180,83,9,0.3);
      transform: translateY(-4px);
    }
    .review-quote-mark {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 72px;
      font-family: Georgia, serif;
      color: var(--amber-light);
      opacity: 0.15;
      line-height: 1;
    }
    .review-stars { font-size: 16px; color: var(--amber-light); margin-bottom: 16px; letter-spacing: 2px; }
    .review-text {
      font-size: 15px;
      color: var(--slate-300);
      line-height: 1.75;
      font-style: italic;
      margin-bottom: 24px;
    }
    .review-author-name {
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }
    .review-author-loc {
      font-size: 12px;
      color: var(--slate-400);
      margin-top: 2px;
    }

    /* ── Contact ───────────────────────────────────────────────── */
    #contact { padding: 0; }
    .contact-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 640px;
    }
    .contact-dark {
      background: var(--navy-darkest);
      padding: 80px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .contact-dark .section-label { margin-bottom: 8px; }
    .contact-dark h2 {
      font-size: 36px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 40px;
    }
    .contact-detail {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 28px;
    }
    .contact-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      background: rgba(180,83,9,0.12);
      border: 1px solid rgba(180,83,9,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .contact-icon svg { width: 20px; height: 20px; color: var(--amber-light); }
    .contact-detail-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--slate-400);
      margin-bottom: 4px;
    }
    .contact-detail-value {
      font-family: 'Poppins', sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--white);
    }
    .contact-detail-value a { color: var(--amber-light); }
    .contact-detail-value a:hover { color: var(--amber); }
    .contact-detail-sub {
      font-size: 13px;
      color: var(--slate-400);
      margin-top: 2px;
